name: Scrape Amiibots

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run script
        run: python Data_Collection/fetch_matches.py

      - name: Commit updated data (debug)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          echo "=== FILE LIST ==="
          ls -R
          echo "=== GIT STATUS BEFORE ADD ==="
          git status
          git add -A
          echo "=== GIT STATUS AFTER ADD ==="
          git status
          echo "=== GIT DIFF ==="
          git diff --cached
          git commit -m "Debug commit" || echo "Nothing to commit"
          git push || echo "Nothing to push"
